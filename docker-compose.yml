services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 5s
      retries: 10
    # For NVIDIA GPU on Linux, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  bot-api:
    build: ./bot-api
    container_name: bot-api
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_TIMEOUT: 30
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./bot-api:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/healthz\", timeout=2)'"]
      interval: 20s
      timeout: 5s
      retries: 10

  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade
    restart: unless-stopped
    depends_on:
      bot-api:
        condition: service_healthy
    environment:
      BOT_API_URL: http://bot-api:8000
      ENABLE_LLM_FILTER: ${ENABLE_LLM_FILTER:-false}
      LLM_MIN_CONFIDENCE: ${LLM_MIN_CONFIDENCE:-0.65}
      STRATEGY_MODE: ${STRATEGY_MODE:-conservative}
      CORE_PAIRS: ${CORE_PAIRS:-BTC/USDT ETH/USDT BNB/USDT}
      RISK_PAIRS: ${RISK_PAIRS:-SOL/USDT XRP/USDT AVAX/USDT}
      RISK_STAKE_MULTIPLIER: ${RISK_STAKE_MULTIPLIER:-0.35}
      RISK_MAX_OPEN_TRADES: ${RISK_MAX_OPEN_TRADES:-1}
      RISK_ADX_MIN: ${RISK_ADX_MIN:-26}
      RISK_ATR_MAX: ${RISK_ATR_MAX:-3.4}
      RISK_EMA_SPREAD_MIN: ${RISK_EMA_SPREAD_MIN:-0.25}
      FREQTRADE__EXCHANGE__KEY: ${BINANCE_API_KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${BINANCE_API_SECRET:-}
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${FREQTRADE_API_JWT_SECRET:-}
      FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE_API_USERNAME:-freqtrade}
      FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE_API_PASSWORD:-}
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
    ports:
      - "8080:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy-path /freqtrade/user_data/strategies
      --strategy LlmTrendPullbackStrategy

  scheduler:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade-scheduler
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${BINANCE_API_KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${BINANCE_API_SECRET:-}
      SCHED_DOWNLOAD_ENABLED: ${SCHED_DOWNLOAD_ENABLED:-true}
      SCHED_DOWNLOAD_TIME: ${SCHED_DOWNLOAD_TIME:-02:15}
      SCHED_DOWNLOAD_TIMERANGE: ${SCHED_DOWNLOAD_TIMERANGE:-20230101-}
      SCHED_DOWNLOAD_PAIRS: ${SCHED_DOWNLOAD_PAIRS:-BTC/USDT ETH/USDT BNB/USDT SOL/USDT XRP/USDT AVAX/USDT LINK/USDT INJ/USDT}
      SCHED_PRUNE_ENABLED: ${SCHED_PRUNE_ENABLED:-true}
      SCHED_PRUNE_TIME: ${SCHED_PRUNE_TIME:-03:00}
      SCHED_PRUNE_WEEKDAY: ${SCHED_PRUNE_WEEKDAY:-0}
      SCHED_PRUNE_DAYS: ${SCHED_PRUNE_DAYS:-180}
      TZ: ${TZ:-UTC}
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./scripts:/workspace/scripts:ro
      - scheduler_state:/freqtrade/scheduler_state
    entrypoint: ["/bin/sh", "/workspace/scripts/maintenance-loop.sh"]

volumes:
  ollama_data:
  scheduler_state:
