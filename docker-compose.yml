services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    cpus: ${OLLAMA_CPU_LIMIT:-6}
    mem_limit: ${OLLAMA_MEM_LIMIT:-10g}
    mem_reservation: ${OLLAMA_MEM_RESERVATION:-6g}
    shm_size: ${OLLAMA_SHM_SIZE:-1g}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 5s
      retries: 10
    # For NVIDIA GPU on Linux, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  bot-api:
    build: ./bot-api
    container_name: bot-api
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-}
      LLM_OPENAI_CHAT_PATH: ${LLM_OPENAI_CHAT_PATH:-/chat/completions}
      LLM_OPENAI_RESPONSE_FORMAT_JSON: ${LLM_OPENAI_RESPONSE_FORMAT_JSON:-true}
      LLM_OPENAI_MAX_COMPLETION_TOKENS: ${LLM_OPENAI_MAX_COMPLETION_TOKENS:-}
      LLM_OPENAI_TEMPERATURE: ${LLM_OPENAI_TEMPERATURE:-0.1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-90}
      BINANCE_REST_BASE: ${BINANCE_REST_BASE:-https://api.binance.com}
      BOT_API_ACCESS_LOG_ENABLED: ${BOT_API_ACCESS_LOG_ENABLED:-false}
      LLM_SKILL_PROVIDER: ${LLM_SKILL_PROVIDER:-direct}
      LLM_OFFICIAL_SKILL_BASE_URL: ${LLM_OFFICIAL_SKILL_BASE_URL:-}
      LLM_OFFICIAL_SKILL_FALLBACK_TO_DIRECT: ${LLM_OFFICIAL_SKILL_FALLBACK_TO_DIRECT:-true}
      LLM_OFFICIAL_SKILL_USER_AGENT: ${LLM_OFFICIAL_SKILL_USER_AGENT:-crypto-bot/1.0 (official-skill-provider)}
      LLM_DEBUG_ENABLED: ${LLM_DEBUG_ENABLED:-true}
      LLM_DEBUG_MAX_ENTRIES: ${LLM_DEBUG_MAX_ENTRIES:-250}
      LLM_DEBUG_PROMPT_MAX_CHARS: ${LLM_DEBUG_PROMPT_MAX_CHARS:-8000}
      LLM_DEBUG_RESPONSE_MAX_CHARS: ${LLM_DEBUG_RESPONSE_MAX_CHARS:-8000}
      LLM_DEBUG_DB_PATH: ${LLM_DEBUG_DB_PATH:-/app/data/llm-debug.sqlite}
      LLM_DEBUG_DB_MAX_ROWS: ${LLM_DEBUG_DB_MAX_ROWS:-50000}
      LLM_MARKET_RANK_SKILL_ENABLED: ${LLM_MARKET_RANK_SKILL_ENABLED:-false}
      LLM_MARKET_RANK_BASE_URL: ${LLM_MARKET_RANK_BASE_URL:-https://web3.binance.com}
      LLM_MARKET_RANK_TIMEOUT_SECONDS: ${LLM_MARKET_RANK_TIMEOUT_SECONDS:-6}
      LLM_MARKET_RANK_CACHE_SECONDS: ${LLM_MARKET_RANK_CACHE_SECONDS:-300}
      LLM_MARKET_RANK_MAX_TOKENS: ${LLM_MARKET_RANK_MAX_TOKENS:-120}
      LLM_MARKET_RANK_PERIOD: ${LLM_MARKET_RANK_PERIOD:-50}
      LLM_MARKET_RANK_QUOTE: ${LLM_MARKET_RANK_QUOTE:-USDT}
      LLM_OFFICIAL_MARKET_RANK_PATH: ${LLM_OFFICIAL_MARKET_RANK_PATH:-/bapi/defi/v1/public/wallet-direct/buw/wallet/market/token/pulse/unified/rank/list}
      LLM_MARKET_RANK_CHAIN_ID: ${LLM_MARKET_RANK_CHAIN_ID:-}
      LLM_MARKET_RANK_EXCLUDE_REGEX: ${LLM_MARKET_RANK_EXCLUDE_REGEX:-(UP|DOWN|BULL|BEAR|1000|[0-9][0-9][0-9]+L|[0-9][0-9][0-9]+S)}
      LLM_TRADING_SIGNAL_SKILL_ENABLED: ${LLM_TRADING_SIGNAL_SKILL_ENABLED:-false}
      LLM_TRADING_SIGNAL_BASE_URL: ${LLM_TRADING_SIGNAL_BASE_URL:-https://web3.binance.com}
      LLM_TRADING_SIGNAL_TIMEOUT_SECONDS: ${LLM_TRADING_SIGNAL_TIMEOUT_SECONDS:-6}
      LLM_TRADING_SIGNAL_CACHE_SECONDS: ${LLM_TRADING_SIGNAL_CACHE_SECONDS:-180}
      LLM_TRADING_SIGNAL_MAX_ITEMS: ${LLM_TRADING_SIGNAL_MAX_ITEMS:-120}
      LLM_TRADING_SIGNAL_QUOTE: ${LLM_TRADING_SIGNAL_QUOTE:-USDT}
      LLM_TRADING_SIGNAL_MIN_SCORE: ${LLM_TRADING_SIGNAL_MIN_SCORE:-0.25}
      LLM_OFFICIAL_TRADING_SIGNAL_PATH: ${LLM_OFFICIAL_TRADING_SIGNAL_PATH:-/bapi/defi/v1/public/wallet-direct/buw/wallet/web/signal/smart-money}
      LLM_TRADING_SIGNAL_ENDPOINTS: ${LLM_TRADING_SIGNAL_ENDPOINTS:-/friendly/gateway/v1/public/alpha-trade/market/signal/list,/friendly/gateway/v1/public/alpha-trade/trading-signal/list,/friendly/gateway/v1/public/alpha-trade/whitelist/trading-signal/list}
      LLM_TRADING_SIGNAL_EXCLUDE_REGEX: ${LLM_TRADING_SIGNAL_EXCLUDE_REGEX:-(UP|DOWN|BULL|BEAR|1000|[0-9][0-9][0-9]+L|[0-9][0-9][0-9]+S)}
      LLM_TOKEN_INFO_SKILL_ENABLED: ${LLM_TOKEN_INFO_SKILL_ENABLED:-false}
      LLM_TOKEN_INFO_TIMEOUT_SECONDS: ${LLM_TOKEN_INFO_TIMEOUT_SECONDS:-6}
      LLM_TOKEN_INFO_CACHE_SECONDS: ${LLM_TOKEN_INFO_CACHE_SECONDS:-300}
      LLM_TOKEN_INFO_PATH: ${LLM_TOKEN_INFO_PATH:-/bapi/defi/v5/public/wallet-direct/buw/wallet/market/token/search/ai}
      LLM_TOKEN_AUDIT_SKILL_ENABLED: ${LLM_TOKEN_AUDIT_SKILL_ENABLED:-false}
      LLM_TOKEN_AUDIT_TIMEOUT_SECONDS: ${LLM_TOKEN_AUDIT_TIMEOUT_SECONDS:-6}
      LLM_TOKEN_AUDIT_CACHE_SECONDS: ${LLM_TOKEN_AUDIT_CACHE_SECONDS:-300}
      LLM_TOKEN_AUDIT_PATH: ${LLM_TOKEN_AUDIT_PATH:-/bapi/defi/v1/public/wallet-direct/security/token/audit}
      LLM_ADDRESS_INFO_SKILL_ENABLED: ${LLM_ADDRESS_INFO_SKILL_ENABLED:-false}
      LLM_ADDRESS_INFO_TIMEOUT_SECONDS: ${LLM_ADDRESS_INFO_TIMEOUT_SECONDS:-6}
      LLM_ADDRESS_INFO_CACHE_SECONDS: ${LLM_ADDRESS_INFO_CACHE_SECONDS:-300}
      LLM_ADDRESS_INFO_PATH: ${LLM_ADDRESS_INFO_PATH:-/bapi/defi/v3/public/wallet-direct/buw/wallet/address/pnl/active-position-list}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./bot-api:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/healthz\", timeout=2)'"]
      interval: 20s
      timeout: 5s
      retries: 10

  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade
    restart: unless-stopped
    depends_on:
      bot-api:
        condition: service_healthy
    environment:
      BOT_API_URL: http://bot-api:8000
      ENABLE_LLM_FILTER: ${ENABLE_LLM_FILTER:-false}
      LLM_MIN_CONFIDENCE: ${LLM_MIN_CONFIDENCE:-0.65}
      LLM_CONNECT_TIMEOUT_SECONDS: ${LLM_CONNECT_TIMEOUT_SECONDS:-2}
      LLM_READ_TIMEOUT_SECONDS: ${LLM_READ_TIMEOUT_SECONDS:-15}
      LLM_FAIL_OPEN: ${LLM_FAIL_OPEN:-false}
      DISABLE_PROTECTIONS: ${DISABLE_PROTECTIONS:-false}
      RUNTIME_POLICY_ENABLED: ${RUNTIME_POLICY_ENABLED:-false}
      RUNTIME_POLICY_PATH: ${RUNTIME_POLICY_PATH:-/freqtrade/user_data/logs/llm-runtime-policy.json}
      RUNTIME_POLICY_REFRESH_SECONDS: ${RUNTIME_POLICY_REFRESH_SECONDS:-30}
      STRATEGY_MODE: ${STRATEGY_MODE:-conservative}
      STRATEGY_MINIMAL_ROI_JSON: ${STRATEGY_MINIMAL_ROI_JSON:-}
      STRATEGY_STOPLOSS: ${STRATEGY_STOPLOSS:-}
      STRATEGY_TRAILING_STOP: ${STRATEGY_TRAILING_STOP:-}
      STRATEGY_TRAILING_POSITIVE: ${STRATEGY_TRAILING_POSITIVE:-}
      STRATEGY_TRAILING_OFFSET: ${STRATEGY_TRAILING_OFFSET:-}
      EXIT_USE_RSI_TAKE: ${EXIT_USE_RSI_TAKE:-}
      STALE_TRADE_HOURS: ${STALE_TRADE_HOURS:-}
      STALE_MIN_PROFIT: ${STALE_MIN_PROFIT:-}
      STALE_LOSS_HOURS: ${STALE_LOSS_HOURS:-}
      STALE_LOSS_PCT: ${STALE_LOSS_PCT:-}
      STALE_MAX_HOURS: ${STALE_MAX_HOURS:-}
      CUSTOM_SL_ATR_MULT: ${CUSTOM_SL_ATR_MULT:-}
      CUSTOM_SL_MIN: ${CUSTOM_SL_MIN:-}
      CUSTOM_SL_MAX: ${CUSTOM_SL_MAX:-}
      ENTRY_RANKING_ENABLED: ${ENTRY_RANKING_ENABLED:-}
      ENTRY_RANKING_LOG: ${ENTRY_RANKING_LOG:-}
      AGGR_ENTRY_STRICTNESS: ${AGGR_ENTRY_STRICTNESS:-}
      BENCHMARK_PAIR: ${BENCHMARK_PAIR:-BTC/USDT}
      BENCHMARK_FILTER_FOR_RISK: ${BENCHMARK_FILTER_FOR_RISK:-}
      BENCHMARK_ALLOW_NEUTRAL_FOR_RISK: ${BENCHMARK_ALLOW_NEUTRAL_FOR_RISK:-}
      BENCHMARK_CHAOS_ADX: ${BENCHMARK_CHAOS_ADX:-}
      BENCHMARK_MIN_SPREAD_PCT: ${BENCHMARK_MIN_SPREAD_PCT:-}
      BENCHMARK_REDUCE_STAKE_WHEN_WEAK: ${BENCHMARK_REDUCE_STAKE_WHEN_WEAK:-}
      BENCHMARK_RISK_STAKE_MULT_WHEN_WEAK: ${BENCHMARK_RISK_STAKE_MULT_WHEN_WEAK:-}
      BENCHMARK_CORE_STAKE_MULT_WHEN_WEAK: ${BENCHMARK_CORE_STAKE_MULT_WHEN_WEAK:-}
      ENTRY_TOP_N: ${ENTRY_TOP_N:-}
      ENTRY_MIN_SCORE: ${ENTRY_MIN_SCORE:-}
      CORE_PAIRS: ${CORE_PAIRS:-BTC/USDT ETH/USDT BNB/USDT}
      RISK_PAIRS: ${RISK_PAIRS:-SOL/USDT XRP/USDT AVAX/USDT}
      RISK_STAKE_MULTIPLIER: ${RISK_STAKE_MULTIPLIER:-0.35}
      RISK_MAX_OPEN_TRADES: ${RISK_MAX_OPEN_TRADES:-1}
      RISK_ADX_MIN: ${RISK_ADX_MIN:-26}
      RISK_ATR_MAX: ${RISK_ATR_MAX:-3.4}
      RISK_EMA_SPREAD_MIN: ${RISK_EMA_SPREAD_MIN:-0.25}
      FREQTRADE__EXCHANGE__KEY: ${BINANCE_API_KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${BINANCE_API_SECRET:-}
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${FREQTRADE_API_JWT_SECRET:-}
      FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE_API_USERNAME:-freqtrade}
      FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE_API_PASSWORD:-}
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
    ports:
      - "${FREQTRADE_HOST_PORT:-18080}:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy-path /freqtrade/user_data/strategies
      --strategy LlmTrendPullbackStrategy

  scheduler:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade-scheduler
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${BINANCE_API_KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${BINANCE_API_SECRET:-}
      SCHED_DOWNLOAD_ENABLED: ${SCHED_DOWNLOAD_ENABLED:-true}
      SCHED_DOWNLOAD_TIME: ${SCHED_DOWNLOAD_TIME:-02:15}
      SCHED_DOWNLOAD_TIMERANGE: ${SCHED_DOWNLOAD_TIMERANGE:-20230101-}
      SCHED_DOWNLOAD_PAIRS: ${SCHED_DOWNLOAD_PAIRS:-BTC/USDT ETH/USDT BNB/USDT SOL/USDT XRP/USDT AVAX/USDT LINK/USDT INJ/USDT}
      SCHED_PRUNE_ENABLED: ${SCHED_PRUNE_ENABLED:-true}
      SCHED_PRUNE_TIME: ${SCHED_PRUNE_TIME:-03:00}
      SCHED_PRUNE_WEEKDAY: ${SCHED_PRUNE_WEEKDAY:-0}
      SCHED_PRUNE_DAYS: ${SCHED_PRUNE_DAYS:-180}
      SCHED_STATE_DIR: ${SCHED_STATE_DIR:-/freqtrade/user_data/logs/scheduler_state}
      TZ: ${TZ:-UTC}
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./scripts:/workspace/scripts:ro
    entrypoint: ["/bin/sh", "/workspace/scripts/maintenance-loop.sh"]

  pair-rotator:
    image: docker:cli
    container_name: pair-rotator
    restart: unless-stopped
    depends_on:
      bot-api:
        condition: service_healthy
    working_dir: /workspace
    environment:
      LLM_BOT_API_URL: http://bot-api:8000
      STRATEGY_MODE: ${STRATEGY_MODE:-aggressive}
      LLM_ROTATE_LOOP_INTERVAL_MINUTES: ${LLM_ROTATE_LOOP_INTERVAL_MINUTES:-60}
      LLM_ROTATE_LOOP_JITTER_SECONDS: ${LLM_ROTATE_LOOP_JITTER_SECONDS:-0}
      LLM_ROTATE_AUTO_DISCOVER: ${LLM_ROTATE_AUTO_DISCOVER:-true}
      LLM_ROTATE_DATA_SOURCE: ${LLM_ROTATE_DATA_SOURCE:-exchange}
      LLM_ROTATE_EXCHANGE: ${LLM_ROTATE_EXCHANGE:-binance}
      LLM_ROTATE_QUOTE: ${LLM_ROTATE_QUOTE:-USDT}
      LLM_ROTATE_TOP_N: ${LLM_ROTATE_TOP_N:-6}
      LLM_ROTATE_MIN_CONFIDENCE: ${LLM_ROTATE_MIN_CONFIDENCE:-0.60}
      LLM_ROTATE_ALLOWED_RISK: ${LLM_ROTATE_ALLOWED_RISK:-low medium}
      LLM_ROTATE_ALLOWED_REGIMES: ${LLM_ROTATE_ALLOWED_REGIMES:-trend_pullback breakout mean_reversion}
      LLM_ROTATE_MAX_CANDIDATES: ${LLM_ROTATE_MAX_CANDIDATES:-20}
      LLM_ROTATE_MIN_QUOTE_VOLUME: ${LLM_ROTATE_MIN_QUOTE_VOLUME:-20000000}
      LLM_ROTATE_EXCLUDE_REGEX: ${LLM_ROTATE_EXCLUDE_REGEX:-}
      LLM_ROTATE_USE_SPIKE_BIAS: ${LLM_ROTATE_USE_SPIKE_BIAS:-false}
      LLM_ROTATE_SPIKE_DB_PATH: ${LLM_ROTATE_SPIKE_DB_PATH:-./freqtrade/user_data/logs/spike-scanner.sqlite}
      LLM_ROTATE_SPIKE_LOOKBACK_HOURS: ${LLM_ROTATE_SPIKE_LOOKBACK_HOURS:-48}
      LLM_ROTATE_SPIKE_TOP_N: ${LLM_ROTATE_SPIKE_TOP_N:-4}
      LLM_ROTATE_SPIKE_MIN_SCORE: ${LLM_ROTATE_SPIKE_MIN_SCORE:-0.80}
      LLM_ROTATE_SPIKE_REQUIRE_LLM_ALLOWED: ${LLM_ROTATE_SPIKE_REQUIRE_LLM_ALLOWED:-false}
      LLM_ROTATE_USE_SMART_MONEY_BIAS: ${LLM_ROTATE_USE_SMART_MONEY_BIAS:-false}
      LLM_ROTATE_SMART_MONEY_TOP_N: ${LLM_ROTATE_SMART_MONEY_TOP_N:-4}
      LLM_ROTATE_SMART_MONEY_MIN_SCORE: ${LLM_ROTATE_SMART_MONEY_MIN_SCORE:-0.60}
      LLM_ROTATE_SMART_MONEY_REQUIRE_BUY: ${LLM_ROTATE_SMART_MONEY_REQUIRE_BUY:-true}
      LLM_ROTATE_SMART_MONEY_FORCE_REFRESH: ${LLM_ROTATE_SMART_MONEY_FORCE_REFRESH:-false}
      LLM_ROTATE_SMART_MONEY_FORCE_SLOT: ${LLM_ROTATE_SMART_MONEY_FORCE_SLOT:-true}
      LLM_ROTATE_EXCLUDED_BASES: ${LLM_ROTATE_EXCLUDED_BASES:-USDC USDT FDUSD TUSD USDP BUSD DAI EUR USD1}
      LLM_ROTATE_MIN_ATR_PCT: ${LLM_ROTATE_MIN_ATR_PCT:-0}
      LLM_ROTATE_MIN_ATR_PCT_AGGRESSIVE: ${LLM_ROTATE_MIN_ATR_PCT_AGGRESSIVE:-0.35}
      LLM_ROTATE_OUTCOME_DB_PATH: ${LLM_ROTATE_OUTCOME_DB_PATH:-./freqtrade/user_data/logs/rotation-outcomes.sqlite}
      LLM_ROTATE_OUTCOME_HORIZON_MINUTES: ${LLM_ROTATE_OUTCOME_HORIZON_MINUTES:-60}
      LLM_ROTATE_OUTCOME_SUCCESS_PCT: ${LLM_ROTATE_OUTCOME_SUCCESS_PCT:-1.0}
      LLM_ROTATE_SOURCE_DIVERSITY_ENABLED: ${LLM_ROTATE_SOURCE_DIVERSITY_ENABLED:-true}
      LLM_ROTATE_MIN_BINANCE_SKILL_PAIRS: ${LLM_ROTATE_MIN_BINANCE_SKILL_PAIRS:-2}
      LLM_ROTATE_MIN_ALGO_PAIRS: ${LLM_ROTATE_MIN_ALGO_PAIRS:-2}
      LLM_ROTATE_MIN_SPIKE_PAIRS: ${LLM_ROTATE_MIN_SPIKE_PAIRS:-1}
      BINANCE_REST_BASE: ${BINANCE_REST_BASE:-https://api.binance.com}
      ROTATE_SKIP_BOOTSTRAP_SERVICES: "true"
      ROTATE_DISABLE_LOCK: "true"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - /bin/sh
      - -lc
      - apk add --no-cache bash python3 py3-pip curl jq >/dev/null && exec bash ./scripts/rotate-risk-pairs-loop.sh --mode ${STRATEGY_MODE:-aggressive} --interval-minutes ${LLM_ROTATE_LOOP_INTERVAL_MINUTES:-60}

  policy-pivot:
    image: docker:cli
    container_name: policy-pivot
    restart: unless-stopped
    depends_on:
      bot-api:
        condition: service_healthy
      freqtrade:
        condition: service_started
    working_dir: /workspace
    environment:
      LLM_BOT_API_URL: http://bot-api:8000
      LLM_POLICY_LOOP_ENABLED: ${LLM_POLICY_LOOP_ENABLED:-false}
      LLM_POLICY_INTERVAL_MINUTES: ${LLM_POLICY_INTERVAL_MINUTES:-15}
      LLM_POLICY_LOOKBACK_HOURS: ${LLM_POLICY_LOOKBACK_HOURS:-24}
      LLM_POLICY_HTTP_TIMEOUT_SECONDS: ${LLM_POLICY_HTTP_TIMEOUT_SECONDS:-45}
      LLM_POLICY_TRADES_DB: ${LLM_POLICY_TRADES_DB:-./freqtrade/user_data/tradesv3.sqlite}
      LLM_POLICY_OUTPUT_PATH: ${LLM_POLICY_OUTPUT_PATH:-./freqtrade/user_data/logs/llm-runtime-policy.json}
      LLM_POLICY_USE_SPIKE: ${LLM_POLICY_USE_SPIKE:-true}
      LLM_POLICY_SPIKE_DB_PATH: ${LLM_POLICY_SPIKE_DB_PATH:-./freqtrade/user_data/logs/spike-scanner.sqlite}
      LLM_POLICY_ROTATION_LOG_PATH: ${LLM_POLICY_ROTATION_LOG_PATH:-./freqtrade/user_data/logs/llm-pair-rotation.log}
      TZ: ${TZ:-UTC}
    volumes:
      - ./:/workspace
    command:
      - /bin/sh
      - -lc
      - apk add --no-cache python3 >/dev/null && exec python3 ./scripts/llm-policy-loop.py

  spike-scanner:
    build: ./spike-scanner
    container_name: spike-scanner
    restart: unless-stopped
    ports:
      - "${SPIKE_WEB_PUBLIC_PORT:-8091}:${SPIKE_WEB_PORT:-8090}"
    depends_on:
      bot-api:
        condition: service_healthy
    environment:
      BINANCE_REST_BASE: ${BINANCE_REST_BASE:-https://api.binance.com}
      BINANCE_WS_BASE: ${BINANCE_WS_BASE:-wss://stream.binance.com:9443/stream}
      LLM_BOT_API_URL: http://bot-api:8000
      LLM_ROTATE_QUOTE: ${LLM_ROTATE_QUOTE:-USDT}
      LLM_ROTATE_MIN_QUOTE_VOLUME: ${LLM_ROTATE_MIN_QUOTE_VOLUME:-20000000}
      LLM_ROTATE_EXCLUDE_REGEX: ${LLM_ROTATE_EXCLUDE_REGEX:-}
      SPIKE_QUOTE_ASSET: ${SPIKE_QUOTE_ASSET:-}
      SPIKE_MIN_QUOTE_VOLUME: ${SPIKE_MIN_QUOTE_VOLUME:-}
      SPIKE_EXCLUDE_REGEX: ${SPIKE_EXCLUDE_REGEX:-}
      SPIKE_INCLUDE_SYMBOLS: ${SPIKE_INCLUDE_SYMBOLS:-}
      SPIKE_EXCLUDE_SYMBOLS: ${SPIKE_EXCLUDE_SYMBOLS:-BTCUSDT ETHUSDT}
      SPIKE_UNIVERSE_MAX_SYMBOLS: ${SPIKE_UNIVERSE_MAX_SYMBOLS:-60}
      SPIKE_WS_SYMBOLS_PER_CONN: ${SPIKE_WS_SYMBOLS_PER_CONN:-25}
      SPIKE_TOP_N_ALERTS: ${SPIKE_TOP_N_ALERTS:-5}
      SPIKE_MIN_SCORE: ${SPIKE_MIN_SCORE:-0.80}
      SPIKE_MAX_SPREAD_PCT: ${SPIKE_MAX_SPREAD_PCT:-0.30}
      SPIKE_MIN_BREAKOUT_PCT: ${SPIKE_MIN_BREAKOUT_PCT:-0.003}
      SPIKE_MIN_BUY_RATIO: ${SPIKE_MIN_BUY_RATIO:-0.60}
      SPIKE_MIN_REL_QUOTE: ${SPIKE_MIN_REL_QUOTE:-8.0}
      SPIKE_ALERT_COOLDOWN_MINUTES: ${SPIKE_ALERT_COOLDOWN_MINUTES:-30}
      SPIKE_LOOP_SECONDS: ${SPIKE_LOOP_SECONDS:-5}
      SPIKE_LOG_PATH: ${SPIKE_LOG_PATH:-/data/spike-alerts.jsonl}
      SPIKE_DB_PATH: ${SPIKE_DB_PATH:-/data/spike-scanner.sqlite}
      SPIKE_ROTATION_LOG_PATH: ${SPIKE_ROTATION_LOG_PATH:-/data/llm-pair-rotation.log}
      SPIKE_OUTCOME_HORIZONS_MINUTES: ${SPIKE_OUTCOME_HORIZONS_MINUTES:-60,240,1440,2880}
      SPIKE_OUTCOME_LOOP_SECONDS: ${SPIKE_OUTCOME_LOOP_SECONDS:-30}
      SPIKE_OUTCOME_BATCH_SIZE: ${SPIKE_OUTCOME_BATCH_SIZE:-200}
      SPIKE_LLM_SHADOW_ENABLED: ${SPIKE_LLM_SHADOW_ENABLED:-false}
      SPIKE_LLM_SHADOW_BOT_API_URL: ${SPIKE_LLM_SHADOW_BOT_API_URL:-}
      SPIKE_LLM_SHADOW_TIMEOUT_SECONDS: ${SPIKE_LLM_SHADOW_TIMEOUT_SECONDS:-45}
      SPIKE_LLM_SHADOW_MIN_CONFIDENCE: ${SPIKE_LLM_SHADOW_MIN_CONFIDENCE:-0.65}
      SPIKE_LLM_SHADOW_ALLOWED_REGIMES: ${SPIKE_LLM_SHADOW_ALLOWED_REGIMES:-trend_pullback,breakout}
      SPIKE_LLM_SHADOW_ALLOWED_RISK_LEVELS: ${SPIKE_LLM_SHADOW_ALLOWED_RISK_LEVELS:-low,medium}
      SPIKE_LLM_SHADOW_EVAL_TOP_N: ${SPIKE_LLM_SHADOW_EVAL_TOP_N:-5}
